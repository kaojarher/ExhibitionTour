<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展覽館互動導覽系統 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dark: #8a6f2e;
            --bg-deep: #080c14;
            --bg-card: rgba(12, 18, 32, 0.85);
            --border: rgba(201, 168, 76, 0.2);
            --text-muted: #7a8ba0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Serif TC', serif;
            background: var(--bg-deep);
            color: #e8e4d8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === 背景紋理 === */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(60,100,180,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .grain {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .content-wrap { position: relative; z-index: 1; }

        /* === 導覽欄 === */
        .navbar {
            border-bottom: 1px solid var(--border);
            background: rgba(8,12,20,0.9);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
        }

        .logo-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* === Tab 切換 === */
        .tab-bar {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            display: flex;
            gap: 4px;
        }

        .tab-btn {
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.3s;
            cursor: pointer;
            color: var(--text-muted);
            border: none;
            background: transparent;
            font-family: 'Noto Serif TC', serif;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(201,168,76,0.15) 0%, rgba(201,168,76,0.08) 100%);
            color: var(--gold-light);
            border: 1px solid rgba(201,168,76,0.3);
            box-shadow: 0 0 20px rgba(201,168,76,0.1);
        }

        /* === 卡片 === */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* === 地圖 === */
        #map-viewer, #map-admin {
            height: 520px;
            width: 100%;
            border-radius: 12px;
            background: #0e1520;
        }

        .leaflet-container { background: #0e1520 !important; }

        /* === 按鈕 === */
        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #0a0800;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Serif TC', serif;
        }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,0.3); }
        .btn-ghost {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aab;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Serif TC', serif;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); color: white; }
        .btn-danger {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Serif TC', serif;
        }
        .btn-danger:hover { background: rgba(239,68,68,0.15); }

        /* === 表單元素 === */
        .form-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 14px;
            border-radius: 10px;
            color: #e8e4d8;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Noto Serif TC', serif;
            font-size: 0.9rem;
        }
        .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
        .form-label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
        }

        /* === 語音播放器 === */
        .voice-player {
            background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(8,12,20,0.9) 100%);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .voice-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 28px;
        }

        .voice-bar {
            width: 3px;
            border-radius: 2px;
            background: var(--gold);
            animation: wave 1s ease-in-out infinite;
            opacity: 0.3;
        }
        .voice-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
        .voice-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
        .voice-bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
        .voice-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
        .voice-bar:nth-child(5) { animation-delay: 0.4s; height: 10px; }

        .voice-bar.speaking { opacity: 1; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.2); }
        }

        /* === Toast === */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            transition: all 0.3s;
        }
        #toast.hidden { opacity: 0; transform: translateY(12px); pointer-events: none; }

        /* === 模態視窗 === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.hidden { display: none; }

        /* === 展點列表 === */
        .exhibit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: border-color 0.2s;
        }
        .exhibit-item:hover { border-color: rgba(201,168,76,0.2); }

        /* === 背景設定區 === */
        .bg-preview {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: 2px dashed rgba(255,255,255,0.15);
            object-fit: cover;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === 資訊卡片動畫 === */
        #info-detail { animation: slideIn 0.3s ease; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === 館名標題裝飾 === */
        .hall-name-display {
            font-family: 'Cinzel', serif;
            color: var(--gold-light);
            font-size: 1.1rem;
            letter-spacing: 0.08em;
        }

        .divider-gold {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 6px 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

        .btn-saving { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>
    <div class="grain"></div>

    <div class="content-wrap">
        <!-- 導覽欄 -->
        <nav class="navbar flex flex-wrap justify-between items-center gap-4 mb-0">
            <div class="flex items-center gap-4">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="8" fill="rgba(201,168,76,0.1)"/>
                    <path d="M8 26V14L18 8L28 14V26" stroke="#c9a84c" stroke-width="1.5" stroke-linejoin="round"/>
                    <rect x="14" y="18" width="8" height="8" stroke="#c9a84c" stroke-width="1.5"/>
                    <path d="M18 8V18" stroke="#c9a84c" stroke-width="1" stroke-dasharray="2 2"/>
                </svg>
                <div>
                    <div id="nav-hall-name" class="logo-title text-xl font-bold">展覽館互動導覽系統</div>
                    <div class="text-xs text-gray-500 tracking-widest">INTERACTIVE EXHIBITION GUIDE</div>
                </div>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" id="btn-client" onclick="switchTab('client')">訪客導覽</button>
                <button class="tab-btn" id="btn-admin" onclick="switchTab('admin')">後台管理</button>
            </div>
        </nav>

        <div class="px-4 md:px-8 py-6 max-w-7xl mx-auto">

            <!-- ===== 前台導覽 ===== -->
            <section id="tab-client">
                <!-- 展覽館標題列 -->
                <div class="mb-6 flex items-end justify-between">
                    <div>
                        <div id="client-hall-name" class="hall-name-display">展覽館</div>
                        <div class="divider-gold w-48 mt-1"></div>
                        <div id="client-hall-desc" class="text-xs text-gray-500 mt-1"></div>
                    </div>
                    <!-- 館廳語音導覽 -->
                    <button onclick="speakHall()" class="flex items-center gap-2 text-sm btn-ghost px-4 py-2 rounded-xl">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                        聆聽館廳導覽
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <!-- 地圖 -->
                    <div class="lg:col-span-8">
                        <div class="glass-card p-4 relative">
                            <div id="map-viewer"></div>
                            <div class="absolute bottom-8 left-8 z-[1000] text-xs px-3 py-1.5 rounded-full" style="background:rgba(8,12,20,0.8);border:1px solid rgba(201,168,76,0.2);color:var(--gold);">
                                ● 點擊標記查看展品詳情
                            </div>
                        </div>
                    </div>

                    <!-- 資訊卡 -->
                    <div class="lg:col-span-4">
                        <div class="glass-card p-6 sticky top-6" style="min-height:520px; display:flex; flex-direction:column;">
                            <!-- 空狀態 -->
                            <div id="info-empty" class="my-auto text-center">
                                <div class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center" style="background:rgba(201,168,76,0.05);border:1px solid var(--border);">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                                </div>
                                <div class="font-bold text-lg mb-2" style="color:var(--gold-light);">準備好探索了嗎？</div>
                                <p class="text-sm leading-relaxed" style="color:var(--text-muted);">點擊左側地圖中的標記<br>探索展品詳細資訊</p>
                            </div>

                            <!-- 展品詳情 -->
                            <div id="info-detail" class="hidden flex-1 flex flex-col">
                                <div class="overflow-hidden rounded-xl mb-5 border" style="border-color:var(--border);">
                                    <img id="view-img" src="" alt="" class="w-full h-48 object-cover" style="transition:transform 0.5s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                                </div>
                                <div class="flex-1">
                                    <h2 id="view-title" class="text-2xl font-bold mb-2" style="color:var(--gold-light);font-family:'Cinzel',serif;letter-spacing:0.04em;"></h2>
                                    <div class="divider-gold mb-4"></div>
                                    <p id="view-desc" class="text-sm leading-relaxed mb-5" style="color:#b0b8c8;"></p>

                                    <!-- 語音導覽播放器 -->
                                    <div class="voice-player">
                                        <div class="voice-wave" id="voice-wave">
                                            <div class="voice-bar"></div>
                                            <div class="voice-bar"></div>
                                            <div class="voice-bar"></div>
                                            <div class="voice-bar"></div>
                                            <div class="voice-bar"></div>
                                        </div>
                                        <div class="flex-1">
                                            <div class="text-xs font-bold mb-1" style="color:var(--gold);">語音導覽</div>
                                            <div id="voice-status" class="text-xs" style="color:var(--text-muted);">點擊播放本展品語音說明</div>
                                        </div>
                                        <div class="flex gap-2">
                                            <button id="btn-voice-play" onclick="toggleVoice()" class="btn-gold w-9 h-9 rounded-full flex items-center justify-center">
                                                <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                                <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                            </button>
                                            <button onclick="stopVoice()" class="btn-ghost w-9 h-9 rounded-full flex items-center justify-center">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <button onclick="closeDetail()" class="mt-5 text-xs flex items-center gap-2 transition" style="color:var(--text-muted);" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--text-muted)'">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                                    返回導覽說明
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ===== 後台管理 ===== -->
            <section id="tab-admin" class="hidden">
                <!-- 工具列 -->
                <div class="glass-card p-4 mb-6 flex flex-wrap gap-3 items-center justify-between">
                    <div class="flex items-center gap-3 flex-wrap">
                        <span class="text-sm font-bold" style="color:var(--gold);">資料維護</span>
                        <div style="width:1px;height:20px;background:var(--border);"></div>
                        <button onclick="exportData()" class="btn-ghost flex items-center gap-2 text-sm px-3 py-2 rounded-lg">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            匯出 JSON 備份
                        </button>
                        <label class="btn-ghost flex items-center gap-2 text-sm px-3 py-2 rounded-lg cursor-pointer">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            匯入資料
                            <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                        </label>
                        <button onclick="openBgModal()" class="btn-ghost flex items-center gap-2 text-sm px-3 py-2 rounded-lg">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            背景與標題設定
                        </button>
                    </div>
                    <button onclick="clearData()" class="btn-danger flex items-center gap-2 text-sm px-3 py-2 rounded-lg">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        清空所有展點
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <!-- 表單 -->
                    <div class="lg:col-span-4 space-y-4">
                        <div class="glass-card p-6">
                            <h3 id="form-title" class="font-bold mb-5 flex items-center gap-2" style="color:var(--gold-light);">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                                新增展點
                            </h3>
                            <input type="hidden" id="form-edit-id">

                            <div class="space-y-4">
                                <div>
                                    <label class="form-label">展品名稱</label>
                                    <input type="text" id="form-name" placeholder="例如：青銅鼎" class="form-input">
                                </div>
                                <div>
                                    <label class="form-label">語音導覽文稿（選填）</label>
                                    <textarea id="form-voice-script" rows="3" placeholder="專門供語音播放的文稿，留空則使用描述文字" class="form-input resize-none"></textarea>
                                </div>
                                <div>
                                    <label class="form-label">上傳照片</label>
                                    <input type="file" id="form-file" accept="image/*" class="w-full text-xs text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-yellow-700 file:text-black hover:file:bg-yellow-600 cursor-pointer">
                                    <div id="current-img-preview" class="hidden mt-2">
                                        <p class="text-xs mb-1" style="color:var(--text-muted);">目前圖片（不上傳則保留原圖）</p>
                                        <img id="current-img-thumb" src="" alt="" class="w-16 h-16 object-cover rounded-lg border" style="border-color:var(--border);">
                                    </div>
                                </div>
                                <div>
                                    <label class="form-label">詳細描述</label>
                                    <textarea id="form-desc" rows="4" placeholder="輸入展品歷史背景、規格與故事..." class="form-input resize-none"></textarea>
                                </div>
                                <div class="p-4 rounded-xl text-center" style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);">
                                    <div class="text-xs mb-1" style="color:var(--gold);">地圖定位狀態</div>
                                    <div id="form-coords" class="text-sm" style="color:#aab;font-family:monospace;">尚未點擊地圖選擇位置</div>
                                </div>
                                <div class="flex gap-3">
                                    <button id="save-btn" onclick="saveExhibit()" class="btn-gold flex-1 py-3 rounded-xl text-sm">儲存並更新展點</button>
                                    <button id="cancel-edit-btn" onclick="resetForm()" class="btn-ghost hidden px-4 py-3 rounded-xl text-sm">取消</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 地圖 + 展點清單 -->
                    <div class="lg:col-span-8 space-y-4">
                        <div class="glass-card p-4">
                            <p class="text-xs mb-3 px-1" style="color:var(--text-muted);">🔵 已儲存展點 ｜ 🔴 目前選取位置（點擊地圖更換）</p>
                            <div id="map-admin"></div>
                        </div>
                        <div class="glass-card p-5">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-bold text-sm" style="color:var(--text-muted);">已發佈展點</h3>
                                <span id="exhibit-count" class="text-xs" style="color:var(--text-muted);"></span>
                            </div>
                            <div id="exhibit-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 overflow-y-auto" style="max-height:220px;"></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden">
        <div id="toast-inner" class="glass-card px-5 py-3 text-sm flex items-center gap-3 shadow-2xl">
            <svg id="toast-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            <span id="toast-msg"></span>
        </div>
    </div>

    <!-- 背景與館名設定 Modal -->
    <div id="bg-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeBgModal()">
        <div class="glass-card p-8 w-full max-w-lg mx-4" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-bold text-lg" style="color:var(--gold-light);">展覽館設定</h2>
                <button onclick="closeBgModal()" class="btn-ghost w-8 h-8 rounded-lg flex items-center justify-center text-xs">✕</button>
            </div>

            <!-- 館名 -->
            <div class="mb-6">
                <label class="form-label">展覽館名稱</label>
                <input type="text" id="setting-hall-name" placeholder="例如：戰史陳列室" class="form-input mb-2">
                <label class="form-label mt-3">館廳簡介（語音導覽用）</label>
                <textarea id="setting-hall-desc" rows="3" placeholder="介紹這個展覽館的背景與主題..." class="form-input resize-none"></textarea>
            </div>

            <!-- 背景圖片 -->
            <div class="mb-6">
                <label class="form-label">平面圖背景（地圖底圖）</label>
                <div id="bg-preview-wrap" class="mb-3 overflow-hidden rounded-xl border" style="border-color:var(--border);height:120px;background:#0e1520;display:flex;align-items:center;justify-content:center;">
                    <span id="bg-preview-empty" class="text-xs" style="color:var(--text-muted);">目前使用預設空白地圖</span>
                    <img id="bg-preview-img" src="" alt="" class="hidden w-full h-full object-cover">
                </div>
                <input type="file" id="bg-file-input" accept="image/*" onchange="previewBg(event)" class="w-full text-xs text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-yellow-700 file:text-black hover:file:bg-yellow-600 cursor-pointer mb-2">
                <p class="text-xs" style="color:var(--text-muted);">支援 JPG / PNG，建議比例 4:3，將作為地圖底圖使用</p>
                <button onclick="clearBg()" id="btn-clear-bg" class="btn-danger text-xs px-3 py-1.5 rounded-lg mt-2 hidden">移除背景圖</button>
            </div>

            <div class="flex gap-3">
                <button onclick="saveSettings()" class="btn-gold flex-1 py-3 rounded-xl text-sm">儲存設定</button>
                <button onclick="closeBgModal()" class="btn-ghost px-6 py-3 rounded-xl text-sm">取消</button>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════
    // 全域狀態
    // ═══════════════════════════════════════════════
    let db = (() => {
        try { return JSON.parse(localStorage.getItem('exhibition_db')) || []; }
        catch { return []; }
    })();

    let settings = (() => {
        try { return JSON.parse(localStorage.getItem('exhibition_settings')) || {}; }
        catch { return {}; }
    })();

    let mapViewer, mapAdmin;
    let adminSelectMarker = null;
    let selectedLatLng = null;
    let viewerMarkers = [];
    let adminExhibitMarkers = [];
    let bgOverlayViewer = null;
    let bgOverlayAdmin = null;

    // 語音相關
    let currentUtterance = null;
    let isSpeaking = false;
    let currentExhibit = null;

    // Placeholder 圖片
    window.PLACEHOLDER_IMG = `data:image/svg+xml;utf8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400"><rect width="600" height="400" fill="#0e1520"/><rect x="240" y="155" width="120" height="90" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="6 3"/><text x="300" y="280" text-anchor="middle" fill="#c9a84c" opacity="0.4" font-family="serif" font-size="13">NO IMAGE</text></svg>')}`;
    window.setPlaceholder = (img) => { img.onerror = null; img.src = window.PLACEHOLDER_IMG; };

    // 地圖設定
    const bounds = [[-100, 0], [0, 100]];
    const mapConfig = { crs: L.CRS.Simple, minZoom: -1, maxZoom: 2, zoomSnap: 0.1 };

    const redIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // ═══════════════════════════════════════════════
    // 初始化
    // ═══════════════════════════════════════════════
    window.addEventListener('load', () => {
        initMaps();
        applySettings();
    });

    function initMaps() {
        mapViewer = L.map('map-viewer', mapConfig);
        mapAdmin  = L.map('map-admin',  mapConfig);
        mapViewer.fitBounds(bounds);
        mapAdmin.fitBounds(bounds);

        // 後台點擊選位
        mapAdmin.on('click', (e) => {
            selectedLatLng = e.latlng;
            document.getElementById('form-coords').innerText =
                `已鎖定：LAT ${e.latlng.lat.toFixed(2)}, LNG ${e.latlng.lng.toFixed(2)}`;
            if (adminSelectMarker) mapAdmin.removeLayer(adminSelectMarker);
            adminSelectMarker = L.marker(e.latlng, { icon: redIcon }).addTo(mapAdmin);
        });

        applyBgOverlay();
        renderExhibits();
    }

    // ═══════════════════════════════════════════════
    // 設定（館名 + 背景圖）
    // ═══════════════════════════════════════════════
    function applySettings() {
        const name = settings.hallName || '展覽館';
        const desc = settings.hallDesc || '';
        document.getElementById('nav-hall-name').textContent = name + ' 互動導覽系統';
        document.getElementById('client-hall-name').textContent = name;
        document.getElementById('client-hall-desc').textContent = desc;
        document.title = name + ' 互動導覽系統';
    }

    function applyBgOverlay() {
        if (!mapViewer || !mapAdmin) return;

        // 移除舊的底圖
        if (bgOverlayViewer) { mapViewer.removeLayer(bgOverlayViewer); bgOverlayViewer = null; }
        if (bgOverlayAdmin)  { mapAdmin.removeLayer(bgOverlayAdmin);   bgOverlayAdmin  = null; }

        if (settings.bgImage) {
            bgOverlayViewer = L.imageOverlay(settings.bgImage, bounds).addTo(mapViewer);
            bgOverlayAdmin  = L.imageOverlay(settings.bgImage, bounds).addTo(mapAdmin);
        }
    }

    function openBgModal() {
        // 填入現有設定
        document.getElementById('setting-hall-name').value = settings.hallName || '';
        document.getElementById('setting-hall-desc').value = settings.hallDesc || '';

        const previewImg = document.getElementById('bg-preview-img');
        const previewEmpty = document.getElementById('bg-preview-empty');
        const clearBtn = document.getElementById('btn-clear-bg');
        if (settings.bgImage) {
            previewImg.src = settings.bgImage;
            previewImg.classList.remove('hidden');
            previewEmpty.classList.add('hidden');
            clearBtn.classList.remove('hidden');
        } else {
            previewImg.classList.add('hidden');
            previewEmpty.classList.remove('hidden');
            clearBtn.classList.add('hidden');
        }
        document.getElementById('bg-file-input').value = '';
        document.getElementById('bg-modal').classList.remove('hidden');
    }

    function closeBgModal() {
        document.getElementById('bg-modal').classList.add('hidden');
    }

    function previewBg(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const previewImg = document.getElementById('bg-preview-img');
            previewImg.src = e.target.result;
            previewImg.classList.remove('hidden');
            document.getElementById('bg-preview-empty').classList.add('hidden');
            document.getElementById('btn-clear-bg').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }

    function clearBg() {
        document.getElementById('bg-preview-img').classList.add('hidden');
        document.getElementById('bg-preview-empty').classList.remove('hidden');
        document.getElementById('btn-clear-bg').classList.add('hidden');
        document.getElementById('bg-file-input').value = '';
        // 標記要清除
        document.getElementById('bg-preview-img').src = '';
    }

    function saveSettings() {
        const name = document.getElementById('setting-hall-name').value.trim();
        const desc = document.getElementById('setting-hall-desc').value.trim();
        const previewImg = document.getElementById('bg-preview-img');
        const fileInput = document.getElementById('bg-file-input');

        settings.hallName = name || '展覽館';
        settings.hallDesc = desc;

        const doSave = (imgData) => {
            if (imgData !== undefined) settings.bgImage = imgData;
            try {
                localStorage.setItem('exhibition_settings', JSON.stringify(settings));
            } catch(e) {
                showToast('⚠ 儲存空間不足，設定僅保存於本次工作階段', 'error');
            }
            applySettings();
            applyBgOverlay();
            closeBgModal();
            showToast('✅ 設定已儲存');
        };

        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => doSave(e.target.result);
            reader.onerror = () => { showToast('圖片讀取失敗', 'error'); };
            reader.readAsDataURL(fileInput.files[0]);
        } else if (previewImg.src === '' || previewImg.classList.contains('hidden')) {
            // 用戶選擇清除背景
            doSave(null);
            delete settings.bgImage;
        } else {
            doSave(undefined); // 不改變 bgImage
        }
    }

    // ═══════════════════════════════════════════════
    // 語音導覽
    // ═══════════════════════════════════════════════
    function speakHall() {
        const name = settings.hallName || '展覽館';
        const desc = settings.hallDesc || '';
        const text = desc
            ? `歡迎來到${name}。${desc}`
            : `歡迎來到${name}。請點擊地圖上的標記，探索各展品的詳細介紹。`;
        speakText(text);
    }

    function speakExhibit(ex) {
        stopVoice();
        currentExhibit = ex;
        const script = ex.voiceScript || ex.desc || ex.name;
        const text = `${ex.name}。${script}`;
        speakText(text, true);
    }

    function speakText(text, updateUI = false) {
        if (!('speechSynthesis' in window)) {
            showToast('您的瀏覽器不支援語音功能', 'error');
            return;
        }
        stopVoice();

        currentUtterance = new SpeechSynthesisUtterance(text);
        currentUtterance.lang = 'zh-TW';
        currentUtterance.rate = 0.9;
        currentUtterance.pitch = 1;

        currentUtterance.onstart = () => {
            isSpeaking = true;
            if (updateUI) setVoiceUI(true);
        };
        currentUtterance.onend = () => {
            isSpeaking = false;
            if (updateUI) setVoiceUI(false);
        };
        currentUtterance.onerror = () => {
            isSpeaking = false;
            if (updateUI) setVoiceUI(false);
        };

        window.speechSynthesis.speak(currentUtterance);
    }

    function toggleVoice() {
        if (!currentExhibit) return;
        if (isSpeaking) {
            if (window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
                setVoiceUI(true);
            } else {
                window.speechSynthesis.pause();
                setVoiceUI(false, true);
            }
        } else {
            speakExhibit(currentExhibit);
        }
    }

    function stopVoice() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
        isSpeaking = false;
        setVoiceUI(false);
    }

    function setVoiceUI(speaking, paused = false) {
        const bars = document.querySelectorAll('.voice-bar');
        const playIcon = document.getElementById('icon-play');
        const pauseIcon = document.getElementById('icon-pause');
        const statusEl = document.getElementById('voice-status');

        bars.forEach(b => b.classList.toggle('speaking', speaking && !paused));
        if (speaking && !paused) {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            statusEl.textContent = '正在播放語音導覽...';
        } else if (paused) {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            statusEl.textContent = '語音已暫停，點擊繼續';
        } else {
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            statusEl.textContent = '點擊播放本展品語音說明';
        }
    }

    // ═══════════════════════════════════════════════
    // Tab 切換
    // ═══════════════════════════════════════════════
    function switchTab(tab) {
        stopVoice();
        document.getElementById('tab-client').classList.toggle('hidden', tab !== 'client');
        document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('btn-client').classList.toggle('active', tab === 'client');
        document.getElementById('btn-admin').classList.toggle('active', tab === 'admin');

        requestAnimationFrame(() => {
            setTimeout(() => {
                mapViewer.invalidateSize();
                mapAdmin.invalidateSize();
            }, 50);
        });
    }

    // ═══════════════════════════════════════════════
    // 展點詳情
    // ═══════════════════════════════════════════════
    function openDetail(ex) {
        stopVoice();
        currentExhibit = ex;

        document.getElementById('info-empty').classList.add('hidden');
        const detail = document.getElementById('info-detail');
        detail.classList.remove('hidden');

        document.getElementById('view-title').textContent = ex.name;
        document.getElementById('view-desc').textContent = ex.desc || '';

        const img = document.getElementById('view-img');
        img.src = ex.img || window.PLACEHOLDER_IMG;
        img.alt = ex.name;
        img.onerror = function() { window.setPlaceholder(this); };

        setVoiceUI(false);
    }

    function closeDetail() {
        stopVoice();
        currentExhibit = null;
        document.getElementById('info-detail').classList.add('hidden');
        document.getElementById('info-empty').classList.remove('hidden');
    }

    // ═══════════════════════════════════════════════
    // 儲存展點
    // ═══════════════════════════════════════════════
    function saveExhibit() {
        const name = document.getElementById('form-name').value.trim();
        const desc = document.getElementById('form-desc').value.trim();
        const voiceScript = document.getElementById('form-voice-script').value.trim();
        const fileInput = document.getElementById('form-file');
        const editId = document.getElementById('form-edit-id').value;

        if (!name) { showToast('⚠ 請輸入展品名稱', 'error'); return; }
        if (!selectedLatLng && !editId) { showToast('⚠ 請在地圖上點擊選擇位置', 'error'); return; }

        setSavingState(true);

        const doSave = (imgBase64) => {
            if (editId) {
                const idx = db.findIndex(ex => ex.id === Number(editId));
                if (idx !== -1) {
                    db[idx].name = name;
                    db[idx].desc = desc;
                    db[idx].voiceScript = voiceScript;
                    if (selectedLatLng) db[idx].latlng = selectedLatLng;
                    if (imgBase64) db[idx].img = imgBase64;
                }
                showToast('✅ 展點已更新');
            } else {
                db.push({
                    id: Date.now(), name, desc, voiceScript,
                    latlng: selectedLatLng,
                    img: imgBase64 || window.PLACEHOLDER_IMG
                });
                showToast('✅ 展點已新增');
            }
            updateDB();
            resetForm();
            setSavingState(false);
        };

        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => doSave(e.target.result);
            reader.onerror = () => { showToast('圖片讀取失敗', 'error'); setSavingState(false); };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            doSave(null);
        }
    }

    function setSavingState(isSaving) {
        const btn = document.getElementById('save-btn');
        btn.classList.toggle('btn-saving', isSaving);
        btn.textContent = isSaving ? '儲存中…' : '儲存並更新展點';
    }

    // ═══════════════════════════════════════════════
    // 渲染
    // ═══════════════════════════════════════════════
    function renderExhibits() {
        viewerMarkers.forEach(m => mapViewer.removeLayer(m));
        viewerMarkers = [];
        adminExhibitMarkers.forEach(m => mapAdmin.removeLayer(m));
        adminExhibitMarkers = [];

        const list = document.getElementById('exhibit-list');
        list.innerHTML = '';
        document.getElementById('exhibit-count').textContent = db.length > 0 ? `共 ${db.length} 筆` : '';

        if (db.length === 0) {
            list.innerHTML = '<p style="color:var(--text-muted);font-size:0.8rem;text-align:center;padding:1rem;grid-column:span 2;">尚無展點，請在右側地圖點擊新增位置。</p>';
        }

        db.forEach(ex => {
            const mViewer = L.marker(ex.latlng).addTo(mapViewer);
            viewerMarkers.push(mViewer);
            mViewer.on('click', () => openDetail(ex));

            const mAdmin = L.marker(ex.latlng).addTo(mapAdmin);
            mAdmin.bindTooltip(escapeHtml(ex.name), { permanent: false, direction: 'top' });
            adminExhibitMarkers.push(mAdmin);

            // 列表項
            const item = document.createElement('div');
            item.className = 'exhibit-item';

            const left = document.createElement('div');
            left.style.cssText = 'display:flex;align-items:center;gap:10px;min-width:0;';

            const thumb = document.createElement('img');
            thumb.src = ex.img || window.PLACEHOLDER_IMG;
            thumb.alt = '';
            thumb.style.cssText = 'width:36px;height:36px;object-fit:cover;border-radius:8px;flex-shrink:0;';
            thumb.onerror = function() { window.setPlaceholder(this); };

            const nameSpan = document.createElement('span');
            nameSpan.style.cssText = 'font-size:0.8rem;font-weight:bold;color:#d0d8e8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
            nameSpan.textContent = ex.name;

            left.append(thumb, nameSpan);

            const actions = document.createElement('div');
            actions.style.cssText = 'display:flex;gap:4px;flex-shrink:0;';

            // 語音預覽按鈕
            const voiceBtn = document.createElement('button');
            voiceBtn.title = '語音預覽';
            voiceBtn.style.cssText = 'padding:6px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--gold);transition:background 0.2s;';
            voiceBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
            voiceBtn.onmouseover = () => voiceBtn.style.background = 'rgba(201,168,76,0.15)';
            voiceBtn.onmouseout  = () => voiceBtn.style.background = 'transparent';
            voiceBtn.onclick = () => speakText(`${ex.name}。${ex.voiceScript || ex.desc || ''}`);

            const editBtn = document.createElement('button');
            editBtn.title = '編輯';
            editBtn.style.cssText = 'padding:6px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--gold);transition:background 0.2s;';
            editBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
            editBtn.onmouseover = () => editBtn.style.background = 'rgba(201,168,76,0.15)';
            editBtn.onmouseout  = () => editBtn.style.background = 'transparent';
            editBtn.onclick = () => startEdit(ex.id);

            const delBtn = document.createElement('button');
            delBtn.title = '刪除';
            delBtn.style.cssText = 'padding:6px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:#f87171;transition:background 0.2s;';
            delBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            delBtn.onmouseover = () => delBtn.style.background = 'rgba(239,68,68,0.15)';
            delBtn.onmouseout  = () => delBtn.style.background = 'transparent';
            delBtn.onclick = () => deleteEx(ex.id);

            actions.append(voiceBtn, editBtn, delBtn);
            item.append(left, actions);
            list.appendChild(item);
        });
    }

    // ═══════════════════════════════════════════════
    // 編輯
    // ═══════════════════════════════════════════════
    function startEdit(id) {
        const ex = db.find(e => e.id === id);
        if (!ex) return;

        document.getElementById('form-edit-id').value = id;
        document.getElementById('form-name').value = ex.name;
        document.getElementById('form-desc').value = ex.desc || '';
        document.getElementById('form-voice-script').value = ex.voiceScript || '';
        document.getElementById('form-file').value = '';
        document.getElementById('form-coords').innerText =
            `已鎖定：LAT ${ex.latlng.lat.toFixed(2)}, LNG ${ex.latlng.lng.toFixed(2)}`;

        const thumb = document.getElementById('current-img-thumb');
        thumb.src = ex.img || window.PLACEHOLDER_IMG;
        thumb.onerror = function() { window.setPlaceholder(this); };
        document.getElementById('current-img-preview').classList.remove('hidden');

        selectedLatLng = ex.latlng;
        if (adminSelectMarker) mapAdmin.removeLayer(adminSelectMarker);
        adminSelectMarker = L.marker(ex.latlng, { icon: redIcon }).addTo(mapAdmin);
        mapAdmin.panTo(ex.latlng);

        document.getElementById('form-title').innerHTML =
            '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" style="display:inline;margin-right:8px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 編輯展點';
        document.getElementById('cancel-edit-btn').classList.remove('hidden');
        document.getElementById('form-name').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function resetForm() {
        document.getElementById('form-edit-id').value = '';
        document.getElementById('form-name').value = '';
        document.getElementById('form-desc').value = '';
        document.getElementById('form-voice-script').value = '';
        document.getElementById('form-file').value = '';
        document.getElementById('form-coords').innerText = '尚未點擊地圖選擇位置';
        document.getElementById('current-img-preview').classList.add('hidden');
        document.getElementById('cancel-edit-btn').classList.add('hidden');
        document.getElementById('form-title').innerHTML =
            '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" style="display:inline;margin-right:8px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 新增展點';
        setSavingState(false);
        if (adminSelectMarker) { mapAdmin.removeLayer(adminSelectMarker); adminSelectMarker = null; }
        selectedLatLng = null;
    }

    // ═══════════════════════════════════════════════
    // 匯出 / 匯入
    // ═══════════════════════════════════════════════
    function exportData() {
        if (db.length === 0 && !settings.hallName) {
            showToast('目前沒有資料可以匯出', 'error'); return;
        }
        const payload = { settings, exhibits: db };
        const dataStr = JSON.stringify(payload, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
        const fileName = `展覽館備份_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.json`;
        const a = document.createElement('a');
        a.href = dataUri; a.download = fileName; a.click();
        showToast('✅ 已匯出備份（含館廳設定與展點資料）');
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            event.target.value = '';
            try {
                const imported = JSON.parse(e.target.result);

                // 新格式（含 settings）
                if (imported.exhibits && Array.isArray(imported.exhibits)) {
                    const valid = imported.exhibits.filter(ex => ex && typeof ex.name === 'string' && ex.latlng);
                    const skipped = imported.exhibits.length - valid.length;
                    if (!confirm(`確定匯入？\n• 展點：${valid.length} 筆${skipped > 0 ? `（略過 ${skipped} 筆格式錯誤）` : ''}\n• 館廳設定：${imported.settings ? '包含' : '無'}\n\n這將合併至現有資料。`)) return;
                    if (imported.settings) {
                        settings = { ...settings, ...imported.settings };
                        localStorage.setItem('exhibition_settings', JSON.stringify(settings));
                        applySettings();
                        applyBgOverlay();
                    }
                    const withNewIds = valid.map((ex, i) => ({ ...ex, id: Date.now() + i }));
                    db = [...db, ...withNewIds];
                }
                // 舊格式（純 array）
                else if (Array.isArray(imported)) {
                    const valid = imported.filter(ex => ex && typeof ex.name === 'string' && ex.latlng);
                    const skipped = imported.length - valid.length;
                    if (!confirm(`確定匯入 ${valid.length} 筆展點資料？${skipped > 0 ? `（略過 ${skipped} 筆）` : ''}`)) return;
                    const withNewIds = valid.map((ex, i) => ({ ...ex, id: Date.now() + i }));
                    db = [...db, ...withNewIds];
                } else {
                    showToast('匯入失敗：無法識別格式', 'error'); return;
                }

                updateDB();
                showToast(`✅ 匯入完成`);
            } catch {
                showToast('匯入失敗：請確認為合法 JSON 格式', 'error');
            }
        };
        reader.onerror = () => showToast('檔案讀取失敗', 'error');
        reader.readAsText(file);
    }

    // ═══════════════════════════════════════════════
    // 刪除 / 清空
    // ═══════════════════════════════════════════════
    function deleteEx(id) {
        if (!confirm('確定刪除此展點？')) return;
        db = db.filter(ex => ex.id !== id);
        updateDB();
        if (document.getElementById('form-edit-id').value === String(id)) resetForm();
        showToast('已刪除展點');
    }

    function clearData() {
        if (!confirm('⚠ 注意！這將永久刪除所有展點，確定嗎？')) return;
        db = []; updateDB(); resetForm();
        showToast('已清空所有展點');
    }

    // ═══════════════════════════════════════════════
    // 資料持久化
    // ═══════════════════════════════════════════════
    function updateDB() {
        try {
            localStorage.setItem('exhibition_db', JSON.stringify(db));
        } catch(e) {
            showToast('⚠ 儲存空間已滿，請先匯出 JSON 備份！', 'error', 6000);
        }
        renderExhibits();
    }

    // ═══════════════════════════════════════════════
    // Toast
    // ═══════════════════════════════════════════════
    let toastTimer = null;
    function showToast(msg, type = 'success', duration = 3000) {
        const toast = document.getElementById('toast');
        const inner = document.getElementById('toast-inner');
        const icon  = document.getElementById('toast-icon');
        const msgEl = document.getElementById('toast-msg');

        msgEl.textContent = msg;
        inner.style.borderColor = type === 'error' ? 'rgba(239,68,68,0.4)' : 'rgba(201,168,76,0.25)';
        icon.style.stroke = type === 'error' ? '#f87171' : '#4ade80';

        toast.classList.remove('hidden');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.add('hidden'), duration);
    }

    // ═══════════════════════════════════════════════
    // XSS 防護
    // ═══════════════════════════════════════════════
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    </script>
</body>
